<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>국립산림치유원 안내</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrap {
      width: 100%;
      max-width: 800px;
      padding: 20px;
      text-align: center;
    }

    img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    .text {
      margin-top: 16px;
      font-size: 16px;
      color: #333;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 18px;
      background: #2f6b3b;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
    }

    .btn:hover {
      background: #24552f;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <img src="notice.png" alt="국립산림치유원 소식 안내">

    <div class="text" id="msg">
      10초 후 설문조사 페이지로 자동 이동합니다.
    </div>

    <a class="btn" href="https://naver.me/56XrsbT4">
      👉 지금 바로 참여하기
    </a>
  </div>

  <script>
    const surveyUrl = "https://naver.me/56XrsbT4";

    let timeLeft = 10;
    const msg = document.getElementById("msg");

    const timer = setInterval(() => {
      timeLeft--;
      msg.innerText = timeLeft + "초 후 설문조사 페이지로 자동 이동합니다.";

      if (timeLeft <= 0) {
        clearInterval(timer);
        window.location.href = surveyUrl;
      }
    }, 1000);
  </script>
</body>
</html>
